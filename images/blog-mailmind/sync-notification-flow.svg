<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Background sync and notification logic</title>
  <desc id="d">Two pollers cooperate: the renderer notifies when visible, the main process notifies only for background states, avoiding duplicate toasts.</desc>
  <rect width="960" height="560" fill="#0f172a"/>
  <text x="40" y="48" font-family="Segoe UI, Arial" font-size="26" font-weight="800" letter-spacing="2" fill="#e2e8f0">SYNC &amp; NOTIFICATIONS</text>
  <text x="40" y="76" font-family="Segoe UI, Arial" font-size="15" fill="#94a3b8">Two pollers, never a double toast</text>

  <!-- renderer poller -->
  <rect x="40" y="112" width="400" height="130" rx="14" fill="#1c1f3d" stroke="#818cf8" stroke-width="1.6"/>
  <text x="64" y="142" font-family="Segoe UI, Arial" font-size="17" font-weight="700" fill="#a5b4fc">Renderer poll — every 60s</text>
  <text x="64" y="170" font-family="Segoe UI, Arial" font-size="14" fill="#cbd5e1">Runs only while the window is visible</text>
  <text x="64" y="194" font-family="Segoe UI, Arial" font-size="14" fill="#cbd5e1">Owns the foreground toast + sound</text>
  <text x="64" y="222" font-family="Segoe UI, Arial" font-size="12.5" fill="#64748b">paused on document.hidden</text>

  <!-- main poller -->
  <rect x="520" y="112" width="400" height="130" rx="14" fill="#13251f" stroke="#34d399" stroke-width="1.6"/>
  <text x="544" y="142" font-family="Segoe UI, Arial" font-size="17" font-weight="700" fill="#34d399">Main poll — every 5 min</text>
  <text x="544" y="170" font-family="Segoe UI, Arial" font-size="14" fill="#cbd5e1">Always running, even hidden in tray</text>
  <text x="544" y="194" font-family="Segoe UI, Arial" font-size="14" fill="#cbd5e1">Checks ALL mailboxes via /emails/all</text>
  <text x="544" y="222" font-family="Segoe UI, Arial" font-size="12.5" fill="#64748b">pollInFlight guard — no stacking</text>

  <!-- decision diamond -->
  <polygon points="480,300 600,360 480,420 360,360" fill="#1e293b" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="480" y="352" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#fbbf24">Window</text>
  <text x="480" y="372" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#fbbf24">visible?</text>

  <line x1="240" y1="242" x2="430" y2="330" stroke="#818cf8" stroke-width="2.2" marker-end="url(#g)"/>
  <line x1="720" y1="242" x2="535" y2="330" stroke="#34d399" stroke-width="2.2" marker-end="url(#g)"/>

  <!-- yes branch -->
  <rect x="300" y="468" width="180" height="64" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="390" y="498" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#e2e8f0">Main stays silent</text>
  <text x="390" y="518" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#94a3b8">renderer already notified</text>
  <path d="M440 415 C 400 440, 392 450, 390 468" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#g)"/>
  <text x="360" y="446" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#34d399">YES</text>

  <!-- no branch -->
  <rect x="540" y="468" width="280" height="64" rx="12" fill="#13251f" stroke="#34d399" stroke-width="1.6"/>
  <text x="680" y="494" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#34d399">Main notifies</text>
  <text x="680" y="515" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12.5" fill="#a7f3d0">native toast + tray tooltip + sound, names the mailbox</text>
  <path d="M540 400 C 640 440, 670 450, 680 468" fill="none" stroke="#34d399" stroke-width="2.2" marker-end="url(#g)"/>
  <text x="612" y="436" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#f87171">NO (tray/min)</text>

  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#475569"/></marker>
  </defs>
</svg>
